  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { text-decoration: none; color: inherit; transition: color .2s; }
    a:hover { color: #fff; }

    header {
      border-bottom: 1px solid rgba(255,255,255,.1);
      background: #111;
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav a {
      font-size: .875rem;
      color: #d1d5db;
      margin-right: 2.5rem;
    }
    nav a:last-child { margin-right: 0; }
    .social-nav { display: flex; align-items: center; gap: 1.25rem; }
    .social-nav a { color: #9ca3af; display: flex; }
    .social-nav a:hover { color: #fff; }

    main { flex: 1; display: flex; align-items: center; }
    .main-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 5rem 2rem;
      width: 100%;
    }
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 3rem;
    }
    .hero-left { flex: 1; max-width: 540px; }
    h1 { font-size: 3.25rem; font-weight: 700; line-height: 1.15; margin-bottom: 1.5rem; }
    .bio {
      color: #9ca3af;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 2rem;
      max-width: 440px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: #39ff5a;
      color: #000;
      font-weight: 600;
      font-size: .875rem;
      padding: .75rem 1.75rem;
      border-radius: .375rem;
      box-shadow: 0 0 20px rgba(57,255,90,.3);
      transition: background .2s;
    }
    .btn:hover { background: #2de04f; color: #000; }

    fotp
    .photo-wrap { flex-shrink: 0; }
    .photo-wrap img {
      width: 256px;
      height: 256px;
      border-radius: 50%;
      object-fit: cover;
      object-position: 65% top;
      border: 2px solid rgba(255,255,255,.1);
      box-shadow: 0 25px 50px rgba(0,0,0,.5);
      display: block;
    }

    .info-strip {
      margin-top: 5rem;
      border-top: 1px solid rgba(255,255,255,.1);
      padding-top: 2.5rem;
    }
    .info-label { font-size: .875rem; color: #6b7280; margin-bottom: 1.5rem; }
    .info-cards { display: flex; flex-wrap: wrap; gap: 1.25rem; }
    .info-card {
      display: flex;
      align-items: center;
      gap: .75rem;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: .375rem;
      padding: .75rem 1.25rem;
      background: #111;
      font-size: .875rem;
      color: #d1d5db;
    }
    .info-card svg { color: #9ca3af; flex-shrink: 0; }
    .info-card a { color: #d1d5db; }
    .info-card a:hover { color: #fff; }

    /* botão da musica */
    #music-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,.1);
      color: #9ca3af;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    #music-btn:hover { color: #fff; border-color: rgba(255,255,255,.3); }

    @media (max-width: 640px) {
      h1 { font-size: 2.25rem; }
      .hero { flex-direction: column-reverse; align-items: flex-start; }
      .photo-wrap img { width: 180px; height: 180px; }
    }
  </style>

    <svg id="icon-vol" width="16" height="16" fill="currentColor" viewBox="0 0 24 24" style="display:none"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
  </button>

  <script>
    const audio = document.getElementById('audio');
    const btn   = document.getElementById('music-btn');
    const iMute = document.getElementById('icon-mute');
    const iVol  = document.getElementById('icon-vol');
    let started = false;

    function startMusic() {
      if (started) return;
      started = true;
      audio.volume = 0.15;
      audio.play().then(() => { iMute.style.display='none'; iVol.style.display=''; })
                  .catch(() => {});
      document.removeEventListener('click', startMusic);
      document.removeEventListener('keydown', startMusic);
    }

    document.addEventListener('click', startMusic);
    document.addEventListener('keydown', startMusic);

    btn.addEventListener('click', (e) => {
      e.stopPropagation(); 
      started = true;
      if (audio.paused) {
        audio.volume = 0.15;
        audio.play();
        iMute.style.display = 'none';
        iVol.style.display  = '';
      } else {
        audio.pause();
        iMute.style.display = '';
        iVol.style.display  = 'none';
      }
    });
  </script>
